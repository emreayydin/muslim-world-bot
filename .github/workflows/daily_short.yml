name: Daily Islamic Short

on:
  schedule:
    # Every 4 hours (6x/day, UTC). main.py rotates through 7 content types
    # (Qur'an, Hadith, Dua, Character, Prophets, Islamic story, Did-you-know)
    # via an absolute slot counter, so all 7 air evenly across the week.
    # On long-video days (Tue/Thu/Sun) main.py skips the 20:00 slot so the day
    # stays within YouTube's 10k/day upload quota (5 shorts + 1 long).
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      type:
        description: "Content type (empty = by hour)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no upload)"
        type: boolean
        default: false

permissions:
  contents: write   # allows committing history.json back to the repo

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate & Upload Short
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS=()
          if [ -n "${{ github.event.inputs.type }}" ]; then
            ARGS+=(--type "${{ github.event.inputs.type }}")
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python main.py "${ARGS[@]}"

      - name: Save history (avoid repeats next run)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          if ! git diff --staged --quiet; then
            git commit -m "Update history [skip ci]"
            git pull --rebase --autostash || true
            git push
          fi

      - name: Upload video artifact (dry run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: islamic-short
          path: src/output/*.mp4
          retention-days: 7
