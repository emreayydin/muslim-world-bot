name: Long-form Islamic Video

on:
  schedule:
    # 3x per week: Tue, Thu, Sun at 17:00 UTC (offset from the shorts run so
    # history.json commits don't collide)
    - cron: "0 17 * * 2,4,0"
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic (empty = random)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no upload)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate & Upload Long-form Video
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          FAL_KEY: ${{ secrets.FAL_KEY }}   # AI images; falls back to Pexels if unset
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS=()
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            ARGS+=(--topic "${{ github.event.inputs.topic }}")
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python main_long.py "${ARGS[@]}"

      - name: Save history (avoid repeats next run)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          if ! git diff --staged --quiet; then
            git commit -m "Update history [skip ci]"
            git pull --rebase --autostash || true
            git push
          fi

      - name: Upload video artifact (dry run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: islamic-long
          path: src/output/long_*.mp4
          retention-days: 7
